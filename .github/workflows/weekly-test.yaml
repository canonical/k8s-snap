name: Weekly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 6" # Runs every saturday at midnight
  pull_request:
    paths:
      - .github/workflows/weekly-test.yaml
      - .github/workflows/e2e-tests.yaml
permissions:
  contents: read
  actions: read

jobs:
  test-on-fips:
    name: Integration tests on FIPS machine
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu:22.04", "ubuntu:24.04"]
        arch: ["amd64"]
        channel: ["latest/edge"]
        include:
          - os: "ubuntu:22.04"
            series: "jammy"
          - os: "ubuntu:24.04"
            series: "noble"
    uses: ./.github/workflows/e2e-tests.yaml
    with:
      arch: ${{ matrix.arch }}
      os: ${{ matrix.os }}
      channel: ${{ matrix.channel }}
      test-tags: 'up_to_weekly'
      substrate: 'lxd'
      runner-tags: '{"all": ["self-hosted-linux-${{ matrix.arch }}-${{ matrix.series }}-medium-fips"]}'
      required-snaps: '{"core22": "fips-updates/stable"}'
      extra-test-env: 'TEST_ENABLE_DISA_STIG_HOST=1,TEST_PRELOADED_SNAPS=snapd,TEST_DISA_STIG_USG_TAILORING_FILE_PATH=${{ github.workspace }}/tests/integration/templates/disa_stig/usg-tailoring-${{ matrix.series }}.xml'
    secrets:
      UBUNTU_PRO_TOKEN: ${{ secrets.UBUNTU_PRO_TOKEN }}
      LAUNCHPAD_K8S_CI_BOT_PASSWORD: ${{ secrets.LAUNCHPAD_K8S_CI_BOT_PASSWORD }}

  cncf:
    name: CNCF conformance test
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu:22.04", "ubuntu:24.04"]
        arch: ["amd64"]
        channel:
          [
            "latest/edge",
            "1.32-classic/stable",
            "1.33-classic/stable",
            "1.34-classic/stable",
            "1.35-classic/stable",
          ]
    uses: ./.github/workflows/e2e-tests.yaml
    with:
      arch: ${{ matrix.arch }}
      os: ${{ matrix.os }}
      channel: ${{ matrix.channel }}
      test-tags: 'conformance_tests'
  
  docs:
    # Run linkcheck on release branches
    name: Docs linkcheck (${{ matrix.ref }})
    strategy:
      fail-fast: false
      # Update when new release branches are created
      matrix:
        ref:
          [
            "release-1.32",
            "release-1.33",
            "release-1.34",
            "release-1.35",
          ]
    uses: ./.github/workflows/linkcheck.yaml
    with:
      ref: ${{ matrix.ref }}

  Mattermost:
    name: Notify Mattermost
    # Notify on success or failure but only if the event is a scheduled run.
    # We don't want to ping people of failed PRs.
    if: ${{ always() && github.event_name == 'schedule' }}
    # Note: Update results check below if you change the "needs" list.
    needs: [test-on-fips, cncf, docs]
    runs-on: ubuntu-latest
    steps:
      - name: Set current formatted date as env variable
        run: echo "FORMATTED_DATE=$(date +'%d/%m/%Y')" >> $GITHUB_ENV
      - name: Test results
        run: |
         RESULTS=$(echo '${{ toJson(needs) }}' | jq -c '[.[] | .result]')

         if echo $RESULTS | jq -e 'all(. == "success")'; then
           echo "RESULT=success" >> $GITHUB_ENV
         else
           echo "RESULT=failure" >> $GITHUB_ENV
         fi
      - name: Generate Mattermost Message
        run: |
         if [[ "${{ env.RESULT }}" == "success" ]]; then
           echo "MM_TEXT=:white_check_mark: *Success!* CI completed successfully. [View Run](${{
             github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_ENV
         else
           echo "MM_TEXT=:x: *Failure!* CI failed, @k8s-engineers please fix ASAP. [View Run](${{
             github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_ENV
         fi
      - name: Notify Mattermost
        uses: mattermost/action-mattermost-notify@master
        with:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_BOT_WEBHOOK_URL }}
          PAYLOAD: |
            {
             "attachments": [
               {
                 "fallback": "k8s-snap Weekly CI Status",
                 "color": "${{ env.RESULT == 'success' && 'good' || 'danger' }}",
                 "title": "k8s-snap Weekly CI Status - ${{ env.FORMATTED_DATE }}",
                 "text": "${{ env.MM_TEXT }}"
               }
             ]
            }
