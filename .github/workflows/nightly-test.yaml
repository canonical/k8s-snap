name: Nightly Latest/Edge Tests

on:
  schedule:
    - cron: "0 0 * * *" # Runs every midnight

permissions:
  contents: read

jobs:
  test-integration:
    name: Integration Test ${{ matrix.os }} ${{ matrix.arch }} ${{ matrix.release }}
    strategy:
      matrix:
        os: ["ubuntu:20.04", "ubuntu:22.04", "ubuntu:24.04"]
        arch: ["amd64", "arm64"]
        release: ["latest/edge"]
      fail-fast: false # TODO: remove once arm64 works
    uses: ./.github/workflows/run-e2e-tests.yaml
    with:
      arch: ${{ matrix.arch }}
      os: ${{ matrix.os }}
      release: latest/edge
      test-tags: up_to_weekly
