name: Nightly

on:
  schedule:
    - cron: "0 0 * * *" # Runs every midnight
  pull_request:
    paths:
      - .github/workflows/e2e-tests.yaml
      - .github/workflows/security-scan.yaml
      - .github/workflows/nightly-test.yaml

permissions:
  contents: read
  actions: read

jobs:
  test-integration:
    name: Integration
    strategy:
      matrix:
        os: ["ubuntu:22.04", "ubuntu:24.04"]
        arch: ["amd64", "arm64"]
        # TODO(ben): Automatically fetch all supported releases.
        channel:
          [
            "latest/edge",
            "1.35-classic/edge",
            "1.34-classic/edge",
            "1.33-classic/edge",
            "1.32-classic/edge",
          ]
      fail-fast: false
    uses: ./.github/workflows/e2e-tests.yaml
    with:
      arch: ${{ matrix.arch }}
      os: ${{ matrix.os }}
      channel: ${{ matrix.channel }}
      test-tags: "up_to_nightly"
      parallel: true
      # We need to reduce the max parallelism here to avoid occupying all runners.
      # os * arch * channel * max-parallel = 160 jobs
      max-parallel: 10
      upload-results: true

  build-snap-go-candidate:
    name: Build snap (Go candidate)
    uses: ./.github/workflows/build-snap.yaml
    with:
      arch: amd64
      go-snap-risk: candidate

  test-go-candidate-smoke:
    name: Go candidate smoke test
    needs: build-snap-go-candidate
    uses: ./.github/workflows/e2e-tests.yaml
    with:
      arch: amd64
      os: ubuntu:24.04
      # Smallest tag set, used as a lightweight smoke test.
      test-tags: "pull_request"
      artifact: ${{ needs.build-snap-go-candidate.outputs.snap-artifact }}
      parallel: true
      # upload-results stays false so these don't enter the aggregated report.

  test-performance:
    name: Run performance tests for ${{ matrix.os }}-${{ matrix.arch }}
    strategy:
      matrix:
        os: ["ubuntu:22.04", "ubuntu:24.04"]
        arch: ["amd64", "arm64"]
      fail-fast: false
    uses: ./.github/workflows/compare-performance.yaml
    with:
      arch: ${{ matrix.arch }}
      os: ${{ matrix.os }}
      channel-1: latest/edge
      channel-2: 1.32-classic/stable

  collect-results:
    name: Collect integration test results
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    needs: [test-integration]
    outputs:
      matrix: ${{ steps.aggregate.outputs.matrix }}
    steps:
      - name: Download and aggregate results
        id: aggregate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download all result-* artifacts using the GitHub API with proper pagination.
          # We avoid the download-artifact action because it has a 1000-artifact limit
          # which causes results to be silently dropped when total artifacts exceed 1000.
          page=1
          mkdir -p results
          while true; do
            names=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts?per_page=100&page=${page}" \
              --jq '.artifacts[] | select(.name | startswith("result-")) | .name')
            if [ -z "$names" ]; then
              break
            fi
            # Download artifacts in parallel (up to 10 at a time) for performance.
            echo "$names" | xargs -P10 -I{} gh run download ${{ github.run_id }} --repo ${{ github.repository }} --name "{}" --dir "results/{}"
            page=$((page + 1))
          done
          echo "Downloaded $(find results -mindepth 1 -maxdepth 1 -type d | wc -l) result artifacts"

          # Merge all result.json files into a single array.
          results=$(find results -type f -name 'result.json' -exec cat {} \; | jq -c --slurp .)
          echo "$results" > aggregated-results.json
          echo "matrix=$results" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: aggregated-results
          path: aggregated-results.json

  Mattermost:
    name: Notify Mattermost
    # Notify on success or failure but only if the event is a scheduled run.
    # We don't want to ping people of failed PRs.
    if: ${{ always() && github.event_name == 'schedule' }}
    needs: [test-integration, test-performance, collect-results]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install tox
        run: sudo apt-get install -y tox
      - name: Download integration test results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: aggregated-results
      - name: Aggregate and post results
        working-directory: ci/
        shell: bash
        env:
          MATTERMOST_BOT_WEBHOOK_URL: ${{ secrets.MATTERMOST_BOT_WEBHOOK_URL }}
          MATTERMOST_BOT_TOKEN: ${{ secrets.MATTERMOST_BOT_TOKEN }}
          MATTERMOST_SERVER: ${{ secrets.MATTERMOST_SERVER }}
          # Kubernetes CI Night's watch channel
          MATTERMOST_CHANNEL_ID: "4axiydhyxfr8px4phe9d5wgx7w"
        run: |
          tox -e k8s-ci -- mattermost results-message \
            --webhook $MATTERMOST_BOT_WEBHOOK_URL \
            --server $MATTERMOST_SERVER \
            --bot-token $MATTERMOST_BOT_TOKEN \
            --channel-id $MATTERMOST_CHANNEL_ID \
            --file ${{ github.workspace }}/aggregated-results.json \
            --title "k8s-snap Nightly CI Status - $(date +'%d/%m/%Y')"
