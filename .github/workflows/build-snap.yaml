name: Build k8s-snap

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      arch:
        description: Job runner architecture (amd64 or arm64)
        default: amd64
        type: string
      flavor:
        description: k8s-snap flavor (e.g. strict)
        type: string
      go-snap-risk:
        description: |
          Optional Go snap risk level (e.g. candidate) to build with. When set,
          overrides the risk of the go/<track>/<risk> build-snap in
          snap/snapcraft.yaml. Leave empty to use the channel pinned in
          snap/snapcraft.yaml.
        type: string
        default: ""
    outputs:
      snap-artifact:
        description: Name of the uploaded snap artifact
        value: ${{ jobs.build-snap.outputs.snap-artifact }}

jobs:
  build-snap:
    name: Build snap
    runs-on: ${{ inputs.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    outputs:
      snap-artifact: ${{ steps.build.outputs.snap-artifact }}
    steps:
      - name: Checking out repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Apply flavor-specific patches
        if: inputs.flavor != ''
        env:
          INPUT_FLAVOR: ${{ inputs.flavor }}
        run: |
          ./build-scripts/patches/"$INPUT_FLAVOR"/apply
      - name: Override Go snap risk
        if: inputs.go-snap-risk != ''
        env:
          GO_SNAP_RISK: ${{ inputs.go-snap-risk }}
        run: |
          # Swap only the risk so the Go track stays intact across bumps.
          sed -i -E "s|(- go/[^/[:space:]]+/)[^[:space:]]+|\1${GO_SNAP_RISK}|" snap/snapcraft.yaml
          grep -nE '^\s*- go/' snap/snapcraft.yaml
      - name: Setup LXD
        uses: canonical/setup-lxd@a3c85fc6fb7fff43fcfeae87659e41a8f635b7dd # v0.1.3
      - name: Install snapcraft
        run: |
          sudo snap install snapcraft --classic
      - name: Build k8s snap
        id: build
        env:
          flavor: ${{ inputs.flavor }}
          INPUT_ARCH: ${{ inputs.arch }}
        run: |
          if [[ -n "$flavor" ]]; then
            out_snap=k8s-$flavor-${INPUT_ARCH}.snap
          else
            out_snap=k8s-${INPUT_ARCH}.snap
          fi

          sudo --user "$USER" --preserve-env --preserve-env=PATH -- env -- snapcraft --use-lxd
          mv k8s_*.snap $out_snap

          echo "snap-artifact=$out_snap" >> "$GITHUB_OUTPUT"
      - name: Upload k8s snap
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.build.outputs.snap-artifact }}
          path: ${{ steps.build.outputs.snap-artifact }}
