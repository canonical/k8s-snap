name: Update CI dependencies

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  update-github-actions:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Python dependencies
        run: pip install "requests==2.33.1"

      - name: Check for action updates
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: python ci/k8s-ci.py deps update-actions

      - name: Create pull request
        if: steps.check.outputs.has-changes == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          commit-message: "ci: update GitHub Actions to latest versions"
          title: "ci: update GitHub Actions to latest versions"
          body: |
            Automated update of SHA-pinned GitHub Actions.

            ${{ steps.check.outputs.summary }}
          branch: automation/update-actions
          base: main
          labels: automerge
          delete-branch: true
          token: ${{ secrets.BOT_TOKEN }}
          author: "K8s builder bot <k8s-bot@canonical.com>"

  update-pip-dependencies:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install pip-tools
        run: pip install "pip-tools==7.4.1" "requests==2.33.1"

      - name: Update pip lock files
        id: check
        run: python ci/k8s-ci.py deps update-pip-locks

      - name: Create pull request
        if: steps.check.outputs.has-changes == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          commit-message: "ci: update pip dependencies"
          title: "ci: update pip dependencies"
          body: |
            Automated update of hash-pinned pip dependencies.

            ${{ steps.check.outputs.summary }}
          branch: automation/update-pip-deps
          base: main
          labels: automerge
          delete-branch: true
          token: ${{ secrets.BOT_TOKEN }}
          author: "K8s builder bot <k8s-bot@canonical.com>"
