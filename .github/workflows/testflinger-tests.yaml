name: Testflinger Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
    run-testflinger-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4 
            - name: Zip testflinger test suite
              run: |
                zip -r k8s-test-suite.zip tests/
            - name: Submit Testflinger Job
              uses: canonical/testflinger/.github/actions/submit@main
              timeout-minutes: 30
              with:
                poll: true
                job-path: ci/testflinger-jobs/gpu-operator-test.yaml
                attachments-relative-to: .
