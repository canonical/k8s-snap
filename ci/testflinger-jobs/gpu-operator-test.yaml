job_queue: nvidia-dgx-station

provision_data:
  distro: jammy                  # MUST be jammy or focal to prevent pytest.skip
  kernel: generic

attachments:
  - k8s-test-suite.zip           # Your archive containing the pytest files

test_data:
  # The GPU operator takes up to 10-15 mins to compile/install drivers inside k8s.
  # Ensure your test timeout accommodates this.
  timeout: 1800                  # 30 minutes total execution boundary
  
  test_cmds: |
    #!/bin/bash
    set -ex

    # 1. Unpack tests
    unzip -q k8s-test-suite.zip -d test_env
    cd test_env

    # 2. SANITY CHECK / CLEAN UP HOST DRIVERS
    # If the host image pre-loaded drivers, we must forcibly remove them
    if lsmod | grep -q nvidia; then
        echo "Nvidia drivers detected on host. Purging to allow GPU-operator to manage them..."
        sudo apt-get purge -y '^nvidia-.*'
        sudo apt-get autoremove -y
        # Force unload modules if they are stubborn
        sudo rmmod nvidia_uvm || true
        sudo rmmod nvidia_modeset || true
        sudo rmmod nvidia || true
    fi

    # 3. Bootstrap k8s-snap cluster
    sudo snap install k8s --channel=latest/edge --classic
    sudo k8s bootstrap
    sudo k8s status --wait-ready                  

    # 4. Execute the test targeting the GPU marker
    # This matches the @pytest.mark.tags(tags.GPU) marker on the test
    tox -e integration -- -k "test_deploy_nvidia_gpu_operator"